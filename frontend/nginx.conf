# Serves the built SPA and proxies /api to the backend container.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cache hashed build assets aggressively; never cache index.html.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API -> backend service (same docker network). Long timeouts: a Full Audit
    # or Deep analyze can take minutes on a large database.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # SPA fallback: any non-file route returns index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
